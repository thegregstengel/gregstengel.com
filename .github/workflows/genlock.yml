# TEMPORARY: generates blog/Gemfile.lock in the real CI environment
# (Ruby 3.4) and uploads it as an artifact so we can commit an accurate,
# platform-correct lockfile. Deleted once the lock is committed.
name: Generate Gemfile.lock

on:
  push:
    branches:
      - add-gemfile-lock

jobs:
  genlock:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blog
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4

      - name: Resolve dependencies (writes Gemfile.lock)
        run: bundle install

      - name: Upload Gemfile.lock
        uses: actions/upload-artifact@v4
        with:
          name: gemfile-lock
          path: blog/Gemfile.lock
          if-no-files-found: error
